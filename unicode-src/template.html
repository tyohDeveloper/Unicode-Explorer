<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en">
<head>
  <meta http-equiv="Content-Type" content="application/xhtml+xml; charset=UTF-8" />
  <title>Unicode Character Explorer</title>
  <style type="text/css"><![CDATA[
{{CSS}}

<body>

<header>
  <h1>Unicode Character Explorer</h1>
  <span>Offline &#xB7; Standalone &#xB7; XHTML 1.1 &#xB7; <strong>Unicode 17.0</strong> &#xB7; 346 blocks</span>
</header>

<div id="app">
  <nav id="sidebar">
    <div id="sidebar-controls">
      <span class="sc-label">Unicode Blocks</span>
      <input type="text" id="block-search" title="Filter blocks by name" />
      <div class="btn-row">
        <button type="button" class="btn-sm" id="btn-all">All</button>
        <button type="button" class="btn-sm" id="btn-none">None</button>
      </div>
    </div>
    <div id="block-list-wrap">
      <ul id="block-list"></ul>
    </div>
  </nav>

  <div id="main">
    <div id="controls-bar">
      <div class="control-group">
        <span class="control-label">Display:</span>
        <div class="mode-btns">
          <label title="Large glyphs in a compact grid"><input type="radio" name="mode" value="grid" checked="checked" />Grid</label>
          <label title="Grid with code point below each character"><input type="radio" name="mode" value="grid-cp" />Grid+CP</label>
          <label title="Table with code point, character and name"><input type="radio" name="mode" value="table" />Table</label>
          <label title="Plain selectable text flow"><input type="radio" name="mode" value="plain" />Plain</label>
        </div>
      </div>
      <div class="control-group">
        <label class="toggle-label" for="chk-nonvis">
          <input type="checkbox" id="chk-nonvis" />
          Include non-visible
        </label>
      </div>
      <div class="control-group">
        <span class="control-label">Size:</span>
        <input type="range" id="font-size-slider" min="10" max="48" value="18" step="1" />
        <span id="font-size-val">18px</span>
      </div>
      <div class="control-group">
        <span class="control-label">Font:</span>
        <div class="font-btns">
          <label title="System default font"><input type="radio" name="gfont" value="system-ui,serif" checked="checked" />System</label>
          <label title="Serif (Georgia, Times)"><input type="radio" name="gfont" value="Georgia,'Times New Roman','Noto Serif',serif" />Serif</label>
          <label title="Sans-serif (Arial, Noto Sans)"><input type="radio" name="gfont" value="'Noto Sans',Arial,Helvetica,sans-serif" />Sans</label>
          <label title="Fangsong — traditional Chinese calligraphic style"><input type="radio" name="gfont" value="FangSong,STFangsong,'FZFangSong-Z02',fangsong,serif" />&#x4EFF;&#x5B8B;</label>
          <label title="Math font — best for Mathematical Alphanumeric Symbols"><input type="radio" name="gfont" value="'STIX Two Math','Latin Modern Math','Cambria Math',math,serif" />Math</label>
          <label title="Emoji font — best for Emoticons and Pictograph blocks"><input type="radio" name="gfont" value="'Noto Color Emoji','Segoe UI Emoji','Apple Color Emoji','Noto Emoji',emoji" />Emoji</label>
        </div>
      </div>
      <div id="action-btns">
        <button type="button" class="btn-secondary" id="btn-copy">Copy output</button>
      </div>
    </div>

    <div id="status-bar">
      <span id="stat-blocks">0 blocks selected</span>
      <span id="stat-chars"></span>
    </div>

    <div id="output-wrap">
      <div id="output" tabindex="-1">
        <div id="placeholder">
          <span class="big">&#x2B1B;</span>
          <p>Select one or more Unicode blocks from the sidebar.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="text/javascript"><![CDATA[
{{JS}}
]]></script>
</body>
</html>
