<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en">
<head>
  <meta http-equiv="Content-Type" content="application/xhtml+xml; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unicode Character Explorer</title>
  <style type="text/css"><![CDATA[
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1a2e;
      --panel:    #16213e;
      --surface:  #0f3460;
      --accent:   #e94560;
      --accent2:  #533483;
      --text:     #e0e0e0;
      --text-dim: #8a8a9a;
      --border:   #2a2a4a;
      --mono:     "Cascadia Code", "Fira Code", "Consolas", "DejaVu Sans Mono", monospace;
      --sans:     system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      --radius:   6px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.5; }
    body { display: flex; flex-direction: column; min-height: 100vh; }

    header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: baseline; gap: 12px; flex-shrink: 0; }
    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.02em; color: #fff; }
    header span { font-size: 0.8rem; color: var(--text-dim); }

    #app { display: flex; flex: 1; overflow: hidden; }

    #sidebar { width: 280px; min-width: 200px; max-width: 340px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    #sidebar-controls { padding: 12px 14px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #sidebar-controls > .sc-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); display: block; margin-bottom: 8px; }

    .btn-row { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }

    button { cursor: pointer; border: none; border-radius: var(--radius); font-family: var(--sans); font-size: 0.8rem; padding: 5px 10px; transition: opacity 0.15s, background 0.15s; }
    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }
    .btn-sm { background: var(--surface); color: var(--text); padding: 4px 8px; font-size: 0.75rem; }
    .btn-accent { background: var(--accent); color: #fff; font-weight: 600; font-size: 0.85rem; padding: 6px 14px; }
    .btn-secondary { background: var(--accent2); color: #fff; font-size: 0.85rem; padding: 6px 14px; }

    #block-search { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--sans); font-size: 0.82rem; padding: 5px 9px; margin-bottom: 6px; outline: none; }
    #block-search:focus { border-color: var(--accent); }

    #block-list-wrap { flex: 1; overflow-y: auto; padding: 4px 0; }
    #block-list { list-style: none; }
    #block-list li { display: flex; align-items: center; padding: 3px 14px; cursor: pointer; transition: background 0.1s; gap: 8px; user-select: none; }
    #block-list li:hover { background: rgba(255,255,255,0.05); }
    #block-list li.hidden { display: none; }
    #block-list li input[type="checkbox"] { accent-color: var(--accent); width: 14px; height: 14px; flex-shrink: 0; cursor: pointer; }
    .block-name { font-size: 0.82rem; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .block-range { font-size: 0.7rem; color: var(--text-dim); font-family: var(--mono); flex-shrink: 0; }
    #block-list li.cat-header { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); padding: 10px 14px 3px; cursor: default; background: none; }
    #block-list li.cat-header:hover { background: none; }

    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #controls-bar { background: var(--panel); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; flex-wrap: wrap; gap: 16px; flex-shrink: 0; }
    .control-group { display: flex; align-items: center; gap: 8px; }
    .control-label { font-size: 0.78rem; color: var(--text-dim); white-space: nowrap; }

    .mode-btns { display: flex; gap: 4px; flex-wrap: wrap; }
    .mode-btns label { display: flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: var(--radius); border: 1px solid var(--border); cursor: pointer; font-size: 0.78rem; transition: background 0.15s, border-color 0.15s; user-select: none; }
    .mode-btns input[type="radio"] { display: none; }
    .mode-btns label:has(input:checked) { background: var(--surface); border-color: var(--accent); color: #fff; }
    .mode-btns label:hover { background: rgba(255,255,255,0.06); }

    .toggle-label { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; font-size: 0.82rem; }
    .toggle-label input[type="checkbox"] { accent-color: var(--accent); width: 14px; height: 14px; }

    #font-size-slider { width: 80px; accent-color: var(--accent); }
    #font-size-val { font-size: 0.78rem; color: var(--text-dim); font-family: var(--mono); min-width: 2.5em; }

    #action-btns { margin-left: auto; display: flex; gap: 8px; align-items: center; }

    #status-bar { font-size: 0.75rem; color: var(--text-dim); padding: 0 20px; height: 28px; display: flex; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 16px; }

    #output-wrap { flex: 1; overflow: auto; padding: 16px 20px; background: var(--bg); }
    #output { outline: none; min-height: 100%; }

    .char-grid { display: flex; flex-wrap: wrap; gap: 2px; line-height: 1; }
    .char-grid .gc { display: inline-flex; align-items: center; justify-content: center; width: 2em; height: 2em; border-radius: 3px; background: var(--panel); border: 1px solid var(--border); font-family: var(--mono); transition: background 0.1s; cursor: default; }
    .char-grid .gc:hover { background: var(--surface); border-color: var(--accent); }

    .char-grid-cp { display: flex; flex-wrap: wrap; gap: 4px; }
    .char-grid-cp .gcc { display: flex; flex-direction: column; align-items: center; width: 3.8em; padding: 4px 2px 3px; border-radius: 4px; background: var(--panel); border: 1px solid var(--border); cursor: default; transition: background 0.1s; }
    .char-grid-cp .gcc:hover { background: var(--surface); border-color: var(--accent); }
    .char-grid-cp .gcc .glyph { font-family: var(--mono); line-height: 1.3; }
    .char-grid-cp .gcc .cp { font-size: 0.55em; color: var(--text-dim); font-family: var(--mono); margin-top: 2px; letter-spacing: -0.02em; }

    .char-table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 0.85em; }
    .char-table thead th { text-align: left; padding: 6px 12px; background: var(--panel); border-bottom: 2px solid var(--border); color: var(--text-dim); font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.08em; position: sticky; top: 0; z-index: 1; }
    .char-table tbody tr { border-bottom: 1px solid rgba(255,255,255,0.03); transition: background 0.1s; }
    .char-table tbody tr:hover { background: rgba(255,255,255,0.04); }
    .char-table td { padding: 4px 12px; vertical-align: middle; }
    .char-table td.td-cp { color: var(--accent); white-space: nowrap; width: 7em; }
    .char-table td.td-ch { font-size: 1.3em; line-height: 1.2; width: 2.5em; text-align: center; }
    .char-table td.td-name { color: var(--text-dim); font-size: 0.82em; font-family: var(--sans); }
    .char-table td.td-block { color: var(--text-dim); font-size: 0.78em; font-family: var(--sans); }
    .char-table tr.block-sep td { background: var(--panel); color: var(--accent); font-family: var(--sans); font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.1em; padding: 8px 12px 4px; border-bottom: 1px solid var(--border); }

    .block-sep-heading { display: block; width: 100%; font-size: 0.72em; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin: 12px 0 4px; padding-bottom: 3px; border-bottom: 1px solid var(--border); font-family: var(--sans); }

    #plain-text-out { font-family: var(--mono); white-space: pre-wrap; word-break: break-all; line-height: 1.8; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; min-height: 200px; color: var(--text); user-select: text; }

    #placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); gap: 10px; text-align: center; }
    #placeholder .big { font-size: 3rem; }
    #placeholder p { max-width: 300px; font-size: 0.85rem; }

    ::-webkit-scrollbar { width: 7px; height: 7px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent2); }

    @media (max-width: 640px) {
      #sidebar { width: 200px; }
      .mode-btns label { padding: 4px 6px; font-size: 0.72rem; }
    }
  ]]></style>
</head>
<body>

<header>
  <h1>Unicode Character Explorer</h1>
  <span>Offline · Standalone · XHTML 1.1 · Unicode 15.1</span>
</header>

<div id="app">
  <nav id="sidebar">
    <div id="sidebar-controls">
      <span class="sc-label">Unicode Blocks</span>
      <input type="text" id="block-search" placeholder="Filter blocks…" autocomplete="off" />
      <div class="btn-row">
        <button type="button" class="btn-sm" id="btn-all">All</button>
        <button type="button" class="btn-sm" id="btn-none">None</button>
        <button type="button" class="btn-sm" id="btn-vis">Vis. only</button>
      </div>
    </div>
    <div id="block-list-wrap">
      <ul id="block-list" role="listbox" aria-multiselectable="true"></ul>
    </div>
  </nav>

  <div id="main">
    <div id="controls-bar">
      <div class="control-group">
        <span class="control-label">Display:</span>
        <div class="mode-btns" role="radiogroup" aria-label="Display mode">
          <label title="Large glyphs in a compact grid"><input type="radio" name="mode" value="grid" checked="checked" />Grid</label>
          <label title="Grid with code point below each character"><input type="radio" name="mode" value="grid-cp" />Grid+CP</label>
          <label title="Table with code point, character and name"><input type="radio" name="mode" value="table" />Table</label>
          <label title="Plain selectable text flow"><input type="radio" name="mode" value="plain" />Plain</label>
        </div>
      </div>
      <div class="control-group">
        <label class="toggle-label" for="chk-nonvis">
          <input type="checkbox" id="chk-nonvis" />
          Include non-visible
        </label>
      </div>
      <div class="control-group">
        <span class="control-label">Size:</span>
        <input type="range" id="font-size-slider" min="10" max="48" value="18" step="1" />
        <span id="font-size-val">18px</span>
      </div>
      <div id="action-btns">
        <button type="button" class="btn-secondary" id="btn-copy">Copy output</button>
        <button type="button" class="btn-accent" id="btn-show">Show &#x25B6;</button>
      </div>
    </div>

    <div id="status-bar">
      <span id="stat-blocks">0 blocks selected</span>
      <span id="stat-chars"></span>
    </div>

    <div id="output-wrap">
      <div id="output" tabindex="-1">
        <div id="placeholder">
          <span class="big">&#x2B1B;</span>
          <p>Select one or more Unicode blocks from the sidebar, then click <strong>Show</strong>.</p>
          <p style="font-size:0.75rem;margin-top:8px;">Ctrl+Enter to show</p>
        </div>
      </div>
    </div>
  </div>
</div>

/* ═══════════════════════════════════════════════════════════════
   Non-visible character classification
═══════════════════════════════════════════════════════════════ */
function isNonVisible(cp) {
  if (cp <= 0x001F) return true;                        // C0 controls
  if (cp >= 0x007F && cp <= 0x009F) return true;        // DEL + C1 controls
  if (cp >= 0xD800 && cp <= 0xDFFF) return true;        // Surrogates
  if (cp === 0xFEFF) return true;                       // BOM
  if (cp >= 0xFFF9 && cp <= 0xFFFB) return true;        // Interlinear annotation
  if (cp === 0xFFFE || cp === 0xFFFF) return true;      // Noncharacters
  if ((cp & 0xFFFF) === 0xFFFE || (cp & 0xFFFF) === 0xFFFF) return true;
  if (cp >= 0xFDD0 && cp <= 0xFDEF) return true;        // Noncharacters
  if (cp >= 0x200B && cp <= 0x200F) return true;        // ZW space, marks
  if (cp >= 0x202A && cp <= 0x202E) return true;        // Bidi overrides
  if (cp >= 0x2060 && cp <= 0x206F) return true;        // Format chars
  if (cp >= 0xFE00 && cp <= 0xFE0F) return true;        // VS 1-16
  if (cp >= 0xE0000 && cp <= 0xE01EF) return true;      // Tags + VS supplement
  if (cp >= 0xE000 && cp <= 0xF8FF) return true;        // Private Use Area
  if (cp >= 0xF0000 && cp <= 0x10FFFF) return true;     // Planes 15-16 (PUA)
  return false;
}

/* ═══════════════════════════════════════════════════════════════
   Utilities
═══════════════════════════════════════════════════════════════ */
function cpToStr(cp) {
  if (cp > 0xFFFF) {
    var c = cp - 0x10000;
    return String.fromCharCode(0xD800 + (c >> 10), 0xDC00 + (c & 0x3FF));
  }
  return String.fromCharCode(cp);
}

function cpHex(cp) {
  return "U+" + hex4(cp);
}

   Build the sidebar block list
═══════════════════════════════════════════════════════════════ */
var blockList = document.getElementById("block-list");

(function buildSidebar() {
  var cats = [], catMap = {};
  BLOCKS.forEach(function(b, idx) {
    var cat = b[3];
    if (!catMap[cat]) { catMap[cat] = []; cats.push(cat); }
    catMap[cat].push(idx);
  });

  cats.forEach(function(cat) {
    var hdr = document.createElement("li");
    hdr.className = "cat-header";
    hdr.textContent = cat;
    hdr.setAttribute("aria-hidden","true");
    blockList.appendChild(hdr);

    catMap[cat].forEach(function(idx) {
      var b = BLOCKS[idx];
      var li = document.createElement("li");
      li.setAttribute("role","option");
      li.setAttribute("aria-selected","false");
      li.dataset.idx = idx;

      var cb = document.createElement("input");
      cb.type = "checkbox";
      cb.id = "blk-" + idx;
      cb.dataset.idx = idx;

      var nm = document.createElement("span");
      nm.className = "block-name";
      nm.textContent = b[0];

      var rng = document.createElement("span");
      rng.className = "block-range";
      rng.textContent = hex4(b[1]).toUpperCase() + "\u2013" + hex4(b[2]).toUpperCase();

      li.appendChild(cb);
      li.appendChild(nm);
      li.appendChild(rng);

      li.addEventListener("click", function(e) {
        if (e.target !== cb) cb.checked = !cb.checked;
        updateStatus();
      });
      blockList.appendChild(li);
    });
  });
})();

/* ═══════════════════════════════════════════════════════════════
   Sidebar controls
═══════════════════════════════════════════════════════════════ */
function getAllChecks() { return blockList.querySelectorAll("input[type=checkbox]"); }

document.getElementById("btn-all").addEventListener("click", function() {
  var cks = getAllChecks();
  for (var i = 0; i < cks.length; i++) {
    if (!cks[i].parentElement.classList.contains("hidden")) cks[i].checked = true;
  }
  updateStatus();
});

document.getElementById("btn-none").addEventListener("click", function() {
  var cks = getAllChecks();
  for (var i = 0; i < cks.length; i++) cks[i].checked = false;
  updateStatus();
});

document.getElementById("btn-vis").addEventListener("click", function() {
  var cks = getAllChecks();
  for (var i = 0; i < cks.length; i++) cks[i].checked = false;
  BLOCKS.forEach(function(b, idx) {
    var cat = b[3];
    if (cat !== "Specials") {
      var cb = document.getElementById("blk-" + idx);
      if (cb) cb.checked = true;
    }
  });
  updateStatus();
});

document.getElementById("block-search").addEventListener("input", function() {
  var q = this.value.toLowerCase();
  var items = blockList.querySelectorAll("li:not(.cat-header)");
  items.forEach(function(li) {
    var nm = li.querySelector(".block-name");
    if (!nm) return;
    li.classList[nm.textContent.toLowerCase().indexOf(q) !== -1 ? "remove" : "add"]("hidden");
  });
  var headers = blockList.querySelectorAll("li.cat-header");
  headers.forEach(function(hdr) {
    var next = hdr.nextElementSibling;
    var vis = false;
    while (next && !next.classList.contains("cat-header")) {
      if (!next.classList.contains("hidden")) { vis = true; break; }
      next = next.nextElementSibling;
    }
    hdr.classList[vis ? "remove" : "add"]("hidden");
  });
});

/* ═══════════════════════════════════════════════════════════════
   Status bar
═══════════════════════════════════════════════════════════════ */
function updateStatus() {
  var sel = 0, cks = getAllChecks();
  for (var i = 0; i < cks.length; i++) if (cks[i].checked) sel++;
  document.getElementById("stat-blocks").textContent = sel + " block" + (sel === 1 ? "" : "s") + " selected";
  document.getElementById("stat-chars").textContent = "";
}
updateStatus();

/* ═══════════════════════════════════════════════════════════════
   Font size slider
═══════════════════════════════════════════════════════════════ */
var currentFontSize = 18;
var slider = document.getElementById("font-size-slider");
var sizeVal = document.getElementById("font-size-val");
slider.addEventListener("input", function() {
  currentFontSize = parseInt(this.value, 10);
  sizeVal.textContent = currentFontSize + "px";
  document.getElementById("output").style.fontSize = currentFontSize + "px";
});

/* ═══════════════════════════════════════════════════════════════
   Main render
═══════════════════════════════════════════════════════════════ */
document.getElementById("btn-show").addEventListener("click", renderOutput);
document.addEventListener("keydown", function(e) { if (e.ctrlKey && e.key === "Enter") renderOutput(); });

function getSelectedBlocks() {
  var r = [];
  var cks = getAllChecks();
  for (var i = 0; i < cks.length; i++) {
    if (cks[i].checked) r.push(BLOCKS[parseInt(cks[i].dataset.idx, 10)]);
  }
  return r;
}

function getMode() {
  var radios = document.querySelectorAll("input[name=mode]");
  for (var i = 0; i < radios.length; i++) if (radios[i].checked) return radios[i].value;
  return "grid";
}

function renderOutput() {
  var blocks = getSelectedBlocks();
  var includeNV = document.getElementById("chk-nonvis").checked;
  var mode = getMode();
  var output = document.getElementById("output");

  if (blocks.length === 0) {
    output.innerHTML = "";
    var ph = document.createElement("div");
    ph.id = "placeholder";
    ph.innerHTML = "<span class=\"big\">\u26A0</span><p>No blocks selected.</p>";
    output.appendChild(ph);
    document.getElementById("stat-chars").textContent = "";
    return;
  }

  /* Collect code points */
  var allCP = [];
  blocks.forEach(function(b) {
    for (var cp = b[1]; cp <= b[2]; cp++) {
      if (cp >= 0xD800 && cp <= 0xDFFF) continue; // always skip surrogates
      if (!includeNV && isNonVisible(cp)) continue;
      allCP.push({ cp: cp, block: b[0] });
    }
  });

  var total = allCP.length;
  document.getElementById("stat-chars").textContent = total.toLocaleString() + " character" + (total === 1 ? "" : "s");

  output.innerHTML = "";
  output.style.fontSize = currentFontSize + "px";

  if (total === 0) {
    var ph2 = document.createElement("div");
    ph2.id = "placeholder";
    ph2.innerHTML = "<span class=\"big\">\u2205</span><p>No characters with current settings.</p>";
    output.appendChild(ph2);
    return;
  }

  if (mode === "grid")      renderGrid(output, blocks, allCP, false);
  else if (mode === "grid-cp") renderGrid(output, blocks, allCP, true);
  else if (mode === "table")   renderTable(output, blocks, allCP);
  else                         renderPlain(output, allCP);
}

function groupByBlock(allCP) {
  var m = {};
  allCP.forEach(function(item) {
    if (!m[item.block]) m[item.block] = [];
    m[item.block].push(item);
  });
  return m;
}

/* ── Grid ─────────────────────────────────────────────────── */
function renderGrid(output, blocks, allCP, showCP) {
  var byBlock = groupByBlock(allCP);
  blocks.forEach(function(b) {
    var items = byBlock[b[0]];
    if (!items || items.length === 0) return;

    var sep = document.createElement("span");
    sep.className = "block-sep-heading";
    sep.textContent = b[0] + "  (" + cpHex(b[1]) + " \u2013 " + cpHex(b[2]) + ")";
    output.appendChild(sep);

    var grid = document.createElement("div");
    grid.className = showCP ? "char-grid-cp" : "char-grid";

    items.forEach(function(item) {
      var ch = cpToStr(item.cp);
      var el = document.createElement("div");
      el.className = showCP ? "gcc" : "gc";
      el.title = cpHex(item.cp) + "  " + getCharName(item.cp);

      if (!showCP) {
        el.textContent = ch;
      } else {
        var g = document.createElement("span");
        g.className = "glyph";
        g.textContent = ch;
        var c = document.createElement("span");
        c.className = "cp";
        c.textContent = item.cp.toString(16).toUpperCase().padStart(4,"0");
        el.appendChild(g);
        el.appendChild(c);
      }
      grid.appendChild(el);
    });
    output.appendChild(grid);
  });
}

/* ── Table ────────────────────────────────────────────────── */
function renderTable(output, blocks, allCP) {
  var tbl = document.createElement("table");
  tbl.className = "char-table";
  tbl.setAttribute("cellspacing","0");
  tbl.setAttribute("cellpadding","0");
  var thead = document.createElement("thead");
  thead.innerHTML = "<tr><th>Code Point</th><th>Ch</th><th>Name</th><th>Block</th></tr>";
  tbl.appendChild(thead);
  var tbody = document.createElement("tbody");
  var byBlock = groupByBlock(allCP);

  blocks.forEach(function(b) {
    var items = byBlock[b[0]];
    if (!items || items.length === 0) return;

    var sr = document.createElement("tr");
    sr.className = "block-sep";
    var sd = document.createElement("td");
    sd.setAttribute("colspan","4");
    sd.textContent = b[0] + "  (" + cpHex(b[1]) + " \u2013 " + cpHex(b[2]) + ")";
    sr.appendChild(sd);
    tbody.appendChild(sr);

    items.forEach(function(item) {
      var row = document.createElement("tr");
      var tdCp = document.createElement("td"); tdCp.className = "td-cp"; tdCp.textContent = cpHex(item.cp);
      var tdCh = document.createElement("td"); tdCh.className = "td-ch"; tdCh.textContent = cpToStr(item.cp);
      var tdNm = document.createElement("td"); tdNm.className = "td-name"; tdNm.textContent = getCharName(item.cp);
      var tdBl = document.createElement("td"); tdBl.className = "td-block"; tdBl.textContent = item.block;
      row.appendChild(tdCp); row.appendChild(tdCh); row.appendChild(tdNm); row.appendChild(tdBl);
      tbody.appendChild(row);
    });
  });

  tbl.appendChild(tbody);
  output.appendChild(tbl);
}

/* ── Plain text ───────────────────────────────────────────── */
function renderPlain(output, allCP) {
  var div = document.createElement("div");
  div.id = "plain-text-out";
  var parts = [];
  allCP.forEach(function(item) { parts.push(cpToStr(item.cp)); });
  div.textContent = parts.join(" ");
  output.appendChild(div);
}

/* ═══════════════════════════════════════════════════════════════
   Copy
═══════════════════════════════════════════════════════════════ */
document.getElementById("btn-copy").addEventListener("click", function() {
  var text = (document.getElementById("output").innerText || "").trim();
  if (!text) { alert("Nothing to copy \u2014 click Show first."); return; }
  function done() {
    var btn = document.getElementById("btn-copy");
    var orig = btn.textContent;
    btn.textContent = "Copied!";
    setTimeout(function() { btn.textContent = orig; }, 1500);
  }
  try {
    navigator.clipboard.writeText(text).then(done).catch(function() { fallback(text); done(); });
  } catch(e) { fallback(text); done(); }
});

function fallback(text) {
  var ta = document.createElement("textarea");
  ta.value = text;
  ta.style.cssText = "position:fixed;left:-9999px;top:0";
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand("copy"); } catch(e) {}
  document.body.removeChild(ta);
}

]]></script>
