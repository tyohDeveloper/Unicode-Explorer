<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.1//EN"
  "http://www.w3.org/TR/xhtml11/DTD/xhtml11.dtd">
<!--
  Unicode Character Explorer
  A fully standalone, offline-capable XHTML 1.1 document.
  No external resources are loaded. All Unicode block data is embedded.
  Serve with Content-Type: application/xhtml+xml for strict XHTML parsing,
  or text/html for HTML5 parser compatibility.
-->
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en">
<head>
  <meta http-equiv="Content-Type" content="application/xhtml+xml; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unicode Character Explorer</title>
  <style type="text/css"><![CDATA[
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1a2e;
      --panel:    #16213e;
      --surface:  #0f3460;
      --accent:   #e94560;
      --accent2:  #533483;
      --text:     #e0e0e0;
      --text-dim: #8a8a9a;
      --border:   #2a2a4a;
      --mono:     "Cascadia Code", "Fira Code", "Consolas", "DejaVu Sans Mono", monospace;
      --sans:     system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      --radius:   6px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #fff;
    }
    header span {
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    /* ── Main layout ── */
    #app {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 280px;
      min-width: 220px;
      max-width: 340px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    #sidebar-controls {
      padding: 12px 14px 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #sidebar-controls label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      display: block;
      margin-bottom: 8px;
    }

    .btn-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: var(--radius);
      font-family: var(--sans);
      font-size: 0.8rem;
      padding: 5px 10px;
      transition: opacity 0.15s, background 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }

    .btn-sm {
      background: var(--surface);
      color: var(--text);
      padding: 4px 8px;
      font-size: 0.75rem;
    }
    .btn-accent {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 0.85rem;
      padding: 6px 14px;
    }
    .btn-secondary {
      background: var(--accent2);
      color: #fff;
      font-size: 0.85rem;
      padding: 6px 14px;
    }

    /* ── Block search ── */
    #block-search {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.82rem;
      padding: 5px 9px;
      margin-bottom: 6px;
      outline: none;
    }
    #block-search:focus {
      border-color: var(--accent);
    }

    /* ── Block list ── */
    #block-list-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    #block-list {
      list-style: none;
    }

    #block-list li {
      display: flex;
      align-items: center;
      padding: 3px 14px;
      cursor: pointer;
      border-radius: 0;
      transition: background 0.1s;
      gap: 8px;
      user-select: none;
    }
    #block-list li:hover { background: rgba(255,255,255,0.05); }
    #block-list li.hidden { display: none; }

    #block-list li input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .block-name {
      font-size: 0.82rem;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .block-range {
      font-size: 0.7rem;
      color: var(--text-dim);
      font-family: var(--mono);
      flex-shrink: 0;
    }

    /* Category header rows */
    #block-list li.cat-header {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      padding: 10px 14px 3px;
      cursor: default;
      background: none;
    }
    #block-list li.cat-header:hover { background: none; }

    /* ── Main content ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #controls-bar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      flex-shrink: 0;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-label {
      font-size: 0.78rem;
      color: var(--text-dim);
      white-space: nowrap;
    }

    /* Mode radio buttons */
    .mode-btns {
      display: flex;
      gap: 4px;
    }
    .mode-btns label {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 0.78rem;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }
    .mode-btns input[type="radio"] {
      display: none;
    }
    .mode-btns label:has(input:checked) {
      background: var(--surface);
      border-color: var(--accent);
      color: #fff;
    }
    .mode-btns label:hover {
      background: rgba(255,255,255,0.06);
    }

    /* Non-visible toggle */
    .toggle-label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
      font-size: 0.82rem;
    }
    .toggle-label input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
    }

    /* Font size slider */
    #font-size-slider {
      width: 80px;
      accent-color: var(--accent);
    }
    #font-size-val {
      font-size: 0.78rem;
      color: var(--text-dim);
      font-family: var(--mono);
      min-width: 2.5em;
    }

    /* Action buttons */
    #action-btns {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* Status */
    #status-bar {
      font-size: 0.75rem;
      color: var(--text-dim);
      padding: 0 20px;
      height: 28px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 16px;
    }
    #status-bar span { display: inline-block; }

    /* ── Output area ── */
    #output-wrap {
      flex: 1;
      overflow: auto;
      padding: 16px 20px;
      background: var(--bg);
    }

    #output {
      outline: none;
      min-height: 100%;
    }

    /* ── Grid mode ── */
    .char-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      line-height: 1;
    }
    .char-grid .gc {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2em;
      height: 2em;
      border-radius: 3px;
      background: var(--panel);
      border: 1px solid var(--border);
      font-family: var(--mono);
      transition: background 0.1s;
      cursor: default;
    }
    .char-grid .gc:hover {
      background: var(--surface);
      border-color: var(--accent);
    }

    /* ── Grid+codepoint mode ── */
    .char-grid-cp {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .char-grid-cp .gcc {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 3.6em;
      padding: 4px 2px 3px;
      border-radius: 4px;
      background: var(--panel);
      border: 1px solid var(--border);
      cursor: default;
      transition: background 0.1s;
    }
    .char-grid-cp .gcc:hover {
      background: var(--surface);
      border-color: var(--accent);
    }
    .char-grid-cp .gcc .glyph {
      font-family: var(--mono);
      line-height: 1.3;
    }
    .char-grid-cp .gcc .cp {
      font-size: 0.55em;
      color: var(--text-dim);
      font-family: var(--mono);
      margin-top: 2px;
      letter-spacing: -0.02em;
    }

    /* ── Table mode ── */
    .char-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 0.85em;
    }
    .char-table thead th {
      text-align: left;
      padding: 6px 12px;
      background: var(--panel);
      border-bottom: 2px solid var(--border);
      color: var(--text-dim);
      font-size: 0.75em;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .char-table tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.1s;
    }
    .char-table tbody tr:hover {
      background: rgba(255,255,255,0.04);
    }
    .char-table td {
      padding: 4px 12px;
      vertical-align: middle;
    }
    .char-table td.td-cp {
      color: var(--accent);
      white-space: nowrap;
      width: 7em;
    }
    .char-table td.td-ch {
      font-size: 1.3em;
      line-height: 1.2;
      width: 2.5em;
      text-align: center;
    }
    .char-table td.td-name {
      color: var(--text-dim);
      font-size: 0.82em;
      font-family: var(--sans);
    }
    .char-table td.td-block {
      color: var(--text-dim);
      font-size: 0.78em;
      font-family: var(--sans);
    }

    /* Block separator rows in table mode */
    .char-table tr.block-sep td {
      background: var(--panel);
      color: var(--accent);
      font-family: var(--sans);
      font-size: 0.75em;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 8px 12px 4px;
      border-bottom: 1px solid var(--border);
    }

    /* Block separator headings in grid modes */
    .block-sep-heading {
      display: block;
      width: 100%;
      font-size: 0.72em;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin: 12px 0 4px;
      padding-bottom: 3px;
      border-bottom: 1px solid var(--border);
      font-family: var(--sans);
    }

    /* ── Plain text mode ── */
    #plain-text-out {
      font-family: var(--mono);
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.8;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      min-height: 200px;
      color: var(--text);
      user-select: text;
    }

    /* ── Empty / loading states ── */
    #placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      gap: 10px;
      text-align: center;
    }
    #placeholder .big { font-size: 3rem; }
    #placeholder p { max-width: 300px; font-size: 0.85rem; }

    /* ── Scrollbar styling ── */
    ::-webkit-scrollbar { width: 7px; height: 7px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent2); }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      #sidebar { width: 200px; }
      .mode-btns label { padding: 4px 6px; font-size: 0.72rem; }
      #controls-bar { gap: 10px; }
    }
  ]]></style>
</head>
<body>

<header>
  <h1>Unicode Character Explorer</h1>
  <span>Offline · Standalone · XHTML 1.1</span>
</header>

<div id="app">

  <!-- ── Sidebar: block selector ── -->
  <nav id="sidebar">
    <div id="sidebar-controls">
      <label>Unicode Blocks</label>
      <input type="text" id="block-search" placeholder="Filter blocks…" autocomplete="off" />
      <div class="btn-row">
        <button type="button" class="btn-sm" id="btn-all">Select all</button>
        <button type="button" class="btn-sm" id="btn-none">Deselect all</button>
        <button type="button" class="btn-sm" id="btn-vis">Visible only</button>
      </div>
    </div>
    <div id="block-list-wrap">
      <ul id="block-list" role="listbox" aria-multiselectable="true">
        <!-- populated by JS -->
      </ul>
    </div>
  </nav>

  <!-- ── Main panel ── -->
  <div id="main">

    <!-- Controls bar -->
    <div id="controls-bar">

      <div class="control-group">
        <span class="control-label">Display:</span>
        <div class="mode-btns" role="radiogroup" aria-label="Display mode">
          <label title="Large glyphs in a compact grid">
            <input type="radio" name="mode" value="grid" checked="checked" />
            Grid
          </label>
          <label title="Grid with code point below each character">
            <input type="radio" name="mode" value="grid-cp" />
            Grid+CP
          </label>
          <label title="Table with code point, character and name per row">
            <input type="radio" name="mode" value="table" />
            Table
          </label>
          <label title="Plain text flow, selectable">
            <input type="radio" name="mode" value="plain" />
            Plain
          </label>
        </div>
      </div>

      <div class="control-group">
        <label class="toggle-label" for="chk-nonvis">
          <input type="checkbox" id="chk-nonvis" />
          Include non-visible
        </label>
      </div>

      <div class="control-group">
        <span class="control-label">Size:</span>
        <input type="range" id="font-size-slider" min="10" max="48" value="18" step="1" />
        <span id="font-size-val">18px</span>
      </div>

      <div id="action-btns">
        <button type="button" class="btn-secondary" id="btn-copy">Copy output</button>
        <button type="button" class="btn-accent" id="btn-show">Show ▶</button>
      </div>

    </div>

    <!-- Status bar -->
    <div id="status-bar">
      <span id="stat-blocks">0 blocks selected</span>
      <span id="stat-chars"></span>
    </div>

    <!-- Output -->
    <div id="output-wrap">
      <div id="output" tabindex="-1">
        <div id="placeholder">
          <span class="big">⬛</span>
          <p>Select one or more Unicode blocks from the sidebar, then click <strong>Show</strong>.</p>
        </div>
      </div>
    </div>

  </div><!-- #main -->

</div><!-- #app -->

(function dedup() {
  var seen = {};
  BLOCKS = BLOCKS.filter(function(b) {

    if (seen[key]) return false;

})();

/* ═══════════════════════════════════════════════════════════════
   2.  Minimal Unicode character name lookup
   Full Unicode name tables are enormous (~2 MB). We include a
   curated set for common blocks and generate algorithmic names
   for the rest (e.g. CJK UNIFIED IDEOGRAPH-4E00).
═══════════════════════════════════════════════════════════════ */
function getCharName(cp) {
  // Algorithmic names first (large ranges)
  if (cp >= 0xAC00 && cp <= 0xD7A3) {
    return "HANGUL SYLLABLE " + getHangulName(cp);
  }
  if (cp >= 0x4E00 && cp <= 0x9FFF ||
      cp >= 0x3400 && cp <= 0x4DBF ||
      cp >= 0x20000 && cp <= 0x2A6DF ||
      cp >= 0x2A700 && cp <= 0x2CEAF ||
      cp >= 0x2CEB0 && cp <= 0x2EBEF ||
      cp >= 0x30000 && cp <= 0x323AF) {
    return "CJK UNIFIED IDEOGRAPH-" + cp.toString(16).toUpperCase().padStart(4,"0");
  }
  if (cp >= 0xF900 && cp <= 0xFAFF ||
      cp >= 0x2F800 && cp <= 0x2FA1F) {
    return "CJK COMPATIBILITY IDEOGRAPH-" + cp.toString(16).toUpperCase().padStart(4,"0");
  }
  if (cp >= 0x17000 && cp <= 0x187FF) {
    return "TANGUT IDEOGRAPH-" + cp.toString(16).toUpperCase().padStart(5,"0");
  }
  if (cp >= 0x1B170 && cp <= 0x1B2FF) {
    return "NUSHU CHARACTER-" + cp.toString(16).toUpperCase().padStart(5,"0");
  }
  if (cp >= 0xD800 && cp <= 0xDFFF) return "<surrogate>";
  if (cp >= 0xE000 && cp <= 0xF8FF) return "<private use>";
  if (cp >= 0xF0000 && cp <= 0xFFFFF) return "<private use>";
  if (cp >= 0x100000 && cp <= 0x10FFFF) return "<private use>";
  // Named lookup
  var n = CHAR_NAMES[cp];
  if (n) return n;
  // Category-based fallback
  if (cp <= 0x001F || (cp >= 0x007F && cp <= 0x009F)) return "<control>";
  return "U+" + cp.toString(16).toUpperCase().padStart(4,"0");
}

// Hangul syllable name algorithm (Unicode 3.12)
function getHangulName(cp) {
  var JAMO_L = ["G","GG","N","D","DD","R","M","B","BB","S","SS","","J","JJ","C","K","T","P","H"];
  var JAMO_V = ["A","AE","YA","YAE","EO","E","YEO","YE","O","WA","WAE","OE","YO","U","WEO","WE","WI","YU","EU","YI","I"];
  var JAMO_T = ["","G","GG","GS","N","NJ","NH","D","L","LG","LM","LB","LS","LT","LP","LH","M","B","BS","S","SS","NG","J","C","K","T","P","H"];
  var SBase = 0xAC00, LCount = 19, VCount = 21, TCount = 28;
  var SIndex = cp - SBase;
  var LIndex = Math.floor(SIndex / (VCount * TCount));
  var VIndex = Math.floor((SIndex % (VCount * TCount)) / TCount);
  var TIndex = SIndex % TCount;
  return JAMO_L[LIndex] + JAMO_V[VIndex] + JAMO_T[TIndex];
}

/* ═══════════════════════════════════════════════════════════════
   3.  Non-visible character classification
═══════════════════════════════════════════════════════════════ */
function isNonVisible(cp) {
  // C0 controls
  if (cp <= 0x001F) return true;
  // DEL + C1 controls
  if (cp >= 0x007F && cp <= 0x009F) return true;
  // Surrogates
  if (cp >= 0xD800 && cp <= 0xDFFF) return true;
  // Non-characters
  if (cp === 0xFFFE || cp === 0xFFFF) return true;
  if ((cp & 0xFFFF) === 0xFFFE || (cp & 0xFFFF) === 0xFFFF) return true;
  // Byte Order Mark
  if (cp === 0xFEFF) return true;
  // Format characters (broadly)
  if (cp === 0x200B || cp === 0x200C || cp === 0x200D || cp === 0x200E || cp === 0x200F) return true;
  if (cp >= 0x202A && cp <= 0x202E) return true;
  if (cp >= 0x2060 && cp <= 0x206F) return true;
  if (cp === 0xFFF9 || cp === 0xFFFA || cp === 0xFFFB) return true;
  // Variation selectors
  if (cp >= 0xFE00 && cp <= 0xFE0F) return true;
  if (cp >= 0xE0100 && cp <= 0xE01EF) return true;
  // Tags block (mostly invisible)
  if (cp >= 0xE0000 && cp <= 0xE007F) return true;
  // Private use
  if (cp >= 0xE000 && cp <= 0xF8FF) return true;
  if (cp >= 0xF0000 && cp <= 0xFFFFF) return true;
  if (cp >= 0x100000 && cp <= 0x10FFFF) return true;
  return false;
}

/* ═══════════════════════════════════════════════════════════════
   4.  Utility
═══════════════════════════════════════════════════════════════ */
function cpToStr(cp) {
  if (cp <= 0xFFFF) return String.fromCharCode(cp);
  // surrogate pair for supplementary characters
  var c = cp - 0x10000;
  return String.fromCharCode(0xD800 + (c >> 10), 0xDC00 + (c & 0x3FF));
}

function cpHex(cp) {
  return "U+" + cp.toString(16).toUpperCase().padStart(4, "0");
}

/* ═══════════════════════════════════════════════════════════════
   5.  Build the block list UI
═══════════════════════════════════════════════════════════════ */
var blockList = document.getElementById("block-list");

(function buildSidebar() {
  // Group by category
  var cats = [];
  var catMap = {};
  BLOCKS.forEach(function(b, idx) {
    var cat = b[3];
    if (!catMap[cat]) { catMap[cat] = []; cats.push(cat); }
    catMap[cat].push(idx);
  });

  cats.forEach(function(cat) {
    // Category header
    var hdr = document.createElement("li");
    hdr.className = "cat-header";
    hdr.textContent = cat;
    hdr.setAttribute("aria-hidden", "true");
    blockList.appendChild(hdr);

    catMap[cat].forEach(function(idx) {
      var b = BLOCKS[idx];
      var li = document.createElement("li");
      li.setAttribute("role", "option");
      li.setAttribute("aria-selected", "false");
      li.dataset.idx = idx;

      var cb = document.createElement("input");
      cb.type = "checkbox";
      cb.id = "blk-" + idx;
      cb.dataset.idx = idx;

      var nm = document.createElement("span");
      nm.className = "block-name";
      nm.textContent = b[0];

      var rng = document.createElement("span");
      rng.className = "block-range";
      rng.textContent = cpHex(b[1]).slice(2) + "–" + cpHex(b[2]).slice(2);

      li.appendChild(cb);
      li.appendChild(nm);
      li.appendChild(rng);

      li.addEventListener("click", function(e) {
        if (e.target !== cb) cb.checked = !cb.checked;
        updateStatus();
      });

      blockList.appendChild(li);
    });
  });
})();

/* ═══════════════════════════════════════════════════════════════
   6.  Sidebar controls
═══════════════════════════════════════════════════════════════ */
function getAllBlockChecks() {
  return blockList.querySelectorAll("input[type=checkbox]");
}

document.getElementById("btn-all").addEventListener("click", function() {
  var checks = getAllBlockChecks();
  for (var i = 0; i < checks.length; i++) {
    var li = checks[i].parentElement;
    if (!li.classList.contains("hidden")) checks[i].checked = true;
  }
  updateStatus();
});

document.getElementById("btn-none").addEventListener("click", function() {
  var checks = getAllBlockChecks();
  for (var i = 0; i < checks.length; i++) checks[i].checked = false;
  updateStatus();
});

document.getElementById("btn-vis").addEventListener("click", function() {
  // Select only blocks that are predominantly visible characters
  var visibleOnlyCats = [
    "Basic Latin & Extensions","Greek & Cyrillic","Middle Eastern Scripts",
    "South Asian Scripts","Southeast Asian Scripts","East Asian",
    "Other Asian Scripts","Symbols & Punctuation","Emoji & Pictographs",
    "Ancient & Historic Scripts","Musical & Game Symbols","Presentation Forms"
  ];
  var checks = getAllBlockChecks();
  for (var i = 0; i < checks.length; i++) checks[i].checked = false;
  // Check boxes whose block's category is in visibleOnly
  BLOCKS.forEach(function(b, idx) {
    if (visibleOnlyCats.indexOf(b[3]) !== -1) {
      var cb = document.getElementById("blk-" + idx);
      if (cb) cb.checked = true;
    }
  });
  // uncheck specials
  BLOCKS.forEach(function(b, idx) {
    if (b[3] === "Specials") {
      var cb = document.getElementById("blk-" + idx);
      if (cb) cb.checked = false;
    }
  });
  updateStatus();
});

// Block search filter
document.getElementById("block-search").addEventListener("input", function() {
  var q = this.value.toLowerCase();
  var items = blockList.querySelectorAll("li:not(.cat-header)");
  items.forEach(function(li) {
    var nm = li.querySelector(".block-name");
    if (!nm) return;
    var match = nm.textContent.toLowerCase().indexOf(q) !== -1;
    if (match) li.classList.remove("hidden");
    else li.classList.add("hidden");
  });
  // Hide/show cat headers
  var headers = blockList.querySelectorAll("li.cat-header");
  headers.forEach(function(hdr) {
    var next = hdr.nextElementSibling;
    var hasVisible = false;
    while (next && !next.classList.contains("cat-header")) {
      if (!next.classList.contains("hidden")) { hasVisible = true; break; }
      next = next.nextElementSibling;
    }
    if (hasVisible) hdr.classList.remove("hidden");
    else hdr.classList.add("hidden");
  });
});

/* ═══════════════════════════════════════════════════════════════
   7.  Status bar
═══════════════════════════════════════════════════════════════ */
function updateStatus() {
  var sel = 0;
  var checks = getAllBlockChecks();
  for (var i = 0; i < checks.length; i++) if (checks[i].checked) sel++;
  var statBlocks = document.getElementById("stat-blocks");
  statBlocks.textContent = sel + " block" + (sel === 1 ? "" : "s") + " selected";
  document.getElementById("stat-chars").textContent = "";
}
updateStatus();

/* ═══════════════════════════════════════════════════════════════
   8.  Font size slider
═══════════════════════════════════════════════════════════════ */
var slider = document.getElementById("font-size-slider");
var sizeVal = document.getElementById("font-size-val");
var currentFontSize = 18;

slider.addEventListener("input", function() {
  currentFontSize = parseInt(this.value, 10);
  sizeVal.textContent = currentFontSize + "px";
  // Update live output if present
  var out = document.getElementById("output");
  out.style.fontSize = currentFontSize + "px";
});

/* ═══════════════════════════════════════════════════════════════
   9.  Show button — main rendering logic
═══════════════════════════════════════════════════════════════ */
document.getElementById("btn-show").addEventListener("click", function() {
  renderOutput();
});

function getSelectedBlocks() {
  var result = [];
  var checks = getAllBlockChecks();
  for (var i = 0; i < checks.length; i++) {
    if (checks[i].checked) {
      var idx = parseInt(checks[i].dataset.idx, 10);
      result.push(BLOCKS[idx]);
    }
  }
  return result;
}

function getMode() {
  var radios = document.querySelectorAll("input[name=mode]");
  for (var i = 0; i < radios.length; i++) {
    if (radios[i].checked) return radios[i].value;
  }
  return "grid";
}

function renderOutput() {
  var blocks = getSelectedBlocks();
  var includeNonVis = document.getElementById("chk-nonvis").checked;
  var mode = getMode();
  var output = document.getElementById("output");

  if (blocks.length === 0) {
    output.innerHTML = "";
    var ph = document.createElement("div");
    ph.id = "placeholder";
    ph.innerHTML = "<span class=\"big\">⚠</span><p>No blocks selected. Pick at least one from the sidebar.</p>";
    output.appendChild(ph);
    document.getElementById("stat-chars").textContent = "";
    return;
  }

  // Collect all code points
  var allCP = [];
  blocks.forEach(function(b) {
    for (var cp = b[1]; cp <= b[2]; cp++) {
      if (!includeNonVis && isNonVisible(cp)) continue;
      // Skip surrogates always (cannot be encoded in JS strings)
      if (cp >= 0xD800 && cp <= 0xDFFF) continue;
      allCP.push({ cp: cp, block: b[0] });
    }
  });

  var total = allCP.length;
  document.getElementById("stat-chars").textContent =
    total.toLocaleString() + " character" + (total === 1 ? "" : "s");

  output.innerHTML = "";
  output.style.fontSize = currentFontSize + "px";

  if (total === 0) {
    var ph2 = document.createElement("div");
    ph2.id = "placeholder";
    ph2.innerHTML = "<span class=\"big\">∅</span><p>No visible characters in the selected blocks with current settings.</p>";
    output.appendChild(ph2);
    return;
  }

  if (mode === "grid")    renderGrid(output, blocks, allCP, includeNonVis, false);
  else if (mode === "grid-cp") renderGrid(output, blocks, allCP, includeNonVis, true);
  else if (mode === "table") renderTable(output, blocks, allCP, includeNonVis);
  else                    renderPlain(output, allCP);
}

/* ── Grid rendering ── */
function renderGrid(output, blocks, allCP, includeNonVis, showCP) {
  // Group by block for section headers
  var byBlock = groupByBlock(allCP);

  blocks.forEach(function(b) {
    var items = byBlock[b[0]];
    if (!items || items.length === 0) return;

    var sep = document.createElement("span");
    sep.className = "block-sep-heading";
    sep.textContent = b[0] + "  (" + cpHex(b[1]) + " – " + cpHex(b[2]) + ")";
    output.appendChild(sep);

    var grid = document.createElement("div");
    grid.className = showCP ? "char-grid-cp" : "char-grid";

    items.forEach(function(item) {
      var ch = cpToStr(item.cp);
      var el = document.createElement("div");
      el.className = showCP ? "gcc" : "gc";
      el.title = cpHex(item.cp) + " " + getCharName(item.cp);

      if (!showCP) {
        el.textContent = ch;
      } else {
        var glyph = document.createElement("span");
        glyph.className = "glyph";
        glyph.textContent = ch;
        var cpSpan = document.createElement("span");
        cpSpan.className = "cp";
        cpSpan.textContent = item.cp.toString(16).toUpperCase().padStart(4,"0");
        el.appendChild(glyph);
        el.appendChild(cpSpan);
      }
      grid.appendChild(el);
    });

    output.appendChild(grid);
  });
}

/* ── Table rendering ── */
function renderTable(output, blocks, allCP, includeNonVis) {
  var tbl = document.createElement("table");
  tbl.className = "char-table";
  tbl.setAttribute("cellspacing", "0");
  tbl.setAttribute("cellpadding", "0");

  var thead = document.createElement("thead");
  thead.innerHTML = "<tr><th>Code Point</th><th>Ch</th><th>Name</th><th>Block</th></tr>";
  tbl.appendChild(thead);

  var tbody = document.createElement("tbody");

  var byBlock = groupByBlock(allCP);
  blocks.forEach(function(b) {
    var items = byBlock[b[0]];
    if (!items || items.length === 0) return;

    // Block separator row
    var sepRow = document.createElement("tr");
    sepRow.className = "block-sep";
    var sepTd = document.createElement("td");
    sepTd.setAttribute("colspan", "4");
    sepTd.textContent = b[0] + "  (" + cpHex(b[1]) + " – " + cpHex(b[2]) + ")";
    sepRow.appendChild(sepTd);
    tbody.appendChild(sepRow);

    items.forEach(function(item) {
      var row = document.createElement("tr");
      var tdCp = document.createElement("td");
      tdCp.className = "td-cp";
      tdCp.textContent = cpHex(item.cp);

      var tdCh = document.createElement("td");
      tdCh.className = "td-ch";
      tdCh.textContent = cpToStr(item.cp);

      var tdNm = document.createElement("td");
      tdNm.className = "td-name";
      tdNm.textContent = getCharName(item.cp);

      var tdBl = document.createElement("td");
      tdBl.className = "td-block";
      tdBl.textContent = item.block;

      row.appendChild(tdCp);
      row.appendChild(tdCh);
      row.appendChild(tdNm);
      row.appendChild(tdBl);
      tbody.appendChild(row);
    });
  });

  tbl.appendChild(tbody);
  output.appendChild(tbl);
}

/* ── Plain text rendering ── */
function renderPlain(output, allCP) {
  var div = document.createElement("div");
  div.id = "plain-text-out";

  // Build a plain string of all characters separated by spaces
  var parts = [];
  allCP.forEach(function(item) {
    parts.push(cpToStr(item.cp));
  });
  div.textContent = parts.join(" ");
  output.appendChild(div);
}

/* ── Group by block name ── */
function groupByBlock(allCP) {
  var map = {};
  allCP.forEach(function(item) {
    if (!map[item.block]) map[item.block] = [];
    map[item.block].push(item);
  });
  return map;
}

/* ═══════════════════════════════════════════════════════════════
   10.  Copy output
═══════════════════════════════════════════════════════════════ */
document.getElementById("btn-copy").addEventListener("click", function() {
  var output = document.getElementById("output");
  var text = output.innerText || output.textContent || "";
  if (!text.trim()) { alert("Nothing to copy — click Show first."); return; }
  try {
    navigator.clipboard.writeText(text).then(function() {
      showCopyFeedback();
    }).catch(function() { fallbackCopy(text); });
  } catch(e) { fallbackCopy(text); }
});

function fallbackCopy(text) {
  var ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.left = "-9999px";
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand("copy"); showCopyFeedback(); } catch(e) {}
  document.body.removeChild(ta);
}

function showCopyFeedback() {
  var btn = document.getElementById("btn-copy");
  var orig = btn.textContent;
  btn.textContent = "Copied!";
  setTimeout(function() { btn.textContent = orig; }, 1500);
}

/* ═══════════════════════════════════════════════════════════════
   11.  Keyboard shortcut: Enter on Show button area
═══════════════════════════════════════════════════════════════ */
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && e.ctrlKey) {
    renderOutput();
  }
});
